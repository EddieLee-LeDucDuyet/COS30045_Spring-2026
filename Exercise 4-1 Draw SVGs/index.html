<!doctype html>
<html>
  <head>
    <title>SVG House</title>
  </head>
  <body>
    <h1>My SVG House</h1>

    <svg width="500" height="400" style="border: 1px solid black">
      <!-- Sky -->
      <rect x="0" y="0" width="500" height="200" fill="lightblue" />

      <!-- Grass -->
      <rect x="0" y="200" width="500" height="200" fill="lightgreen" />

      <!-- House body -->
      <rect
        x="150"
        y="180"
        width="200"
        height="150"
        fill="yellow"
        stroke="black"
      />
      <!-- Chimney -->
      <rect x="300" y="120" width="30" height="60" fill="gray" />
      <!-- Roof -->
      <polygon points="150,180 250,100 350,180" fill="brown" />

      <!-- Door -->
      <rect x="230" y="250" width="40" height="80" fill="saddlebrown" />

      <!-- Windows -->
      <g transform="translate(170,210)" fill="white" stroke="black">
        <rect x="0" y="0" width="40" height="40" />
        <rect x="120" y="0" width="40" height="40" />
      </g>
      <!-- Sun -->
      <circle cx="450" cy="50" r="30" fill="yellow" />

      <!-- Path -->
      <ellipse cx="250" cy="350" rx="60" ry="20" fill="gray" />

      <!-- Text -->
      <text x="180" y="50" font-size="20" fill="black">My House</text>

      <!-- Tree -->
      <rect x="80" y="220" width="20" height="80" fill="brown" />
      <circle cx="90" cy="200" r="40" fill="green" />
    </svg>
    <h2>Annotated SVG Coordinates</h2>
    <img src="images/Screenshot 2026-03-17 190043.png" width="500" />
  </body>
</html>
